    <style id="light-theme-overrides">
      :root {
        font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
        --bg: #f4efe6;
        --sidebar: #f7f1e6;
        --sidebar-edge: #e5d8c6;
        --panel: rgba(255, 255, 255, 0.76);
        --panel-strong: rgba(255, 255, 255, 0.92);
        --panel-dark: linear-gradient(
          135deg,
          rgba(255, 249, 241, 0.98) 0%,
          rgba(234, 241, 248, 0.98) 56%,
          rgba(226, 239, 235, 0.96) 100%
        );
        --text: #1c3147;
        --text-soft: #65778d;
        --text-faint: #90a0b3;
        --line: rgba(74, 96, 124, 0.14);
        --line-strong: rgba(74, 96, 124, 0.2);
        --accent: #4b7cc8;
        --accent-soft: rgba(75, 124, 200, 0.14);
        --success: #3e8669;
        --success-soft: rgba(62, 134, 105, 0.12);
        --warning: #c48b3b;
        --warning-soft: rgba(196, 139, 59, 0.16);
        --danger: #c4655d;
        --danger-soft: rgba(196, 101, 93, 0.14);
        --shadow: 0 28px 70px rgba(78, 97, 124, 0.14);
        --shadow-soft: 0 14px 36px rgba(91, 109, 134, 0.1);
      }

      body {
        background:
          radial-gradient(circle at 8% 8%, rgba(120, 171, 223, 0.2), transparent 28%),
          radial-gradient(circle at 86% 10%, rgba(242, 198, 126, 0.22), transparent 24%),
          radial-gradient(circle at 72% 78%, rgba(171, 212, 201, 0.18), transparent 30%),
          linear-gradient(180deg, #fbf7ef 0%, #f5f7fb 48%, #eef3ee 100%);
      }

      body::before {
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.34)),
          radial-gradient(rgba(74, 96, 124, 0.05) 1px, transparent 1px);
        opacity: 0.68;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.8), transparent 26%),
          radial-gradient(circle at 90% 76%, rgba(255, 244, 227, 0.82), transparent 22%);
        pointer-events: none;
        opacity: 0.42;
      }

      .prototype-shell {
        z-index: 1;
      }

      .brand-card h1,
      .topbar h2,
      .panel h3,
      .panel h4,
      .panel h5,
      .hero-copy h3,
      .judge-banner h3,
      .results-banner h3 {
        font-family: inherit;
        letter-spacing: -0.02em;
      }

      body,
      button,
      input,
      select,
      .metric-card strong,
      .banner-metrics strong,
      .rank-number,
      .ranking-score,
      .judge-current-group {
        font-family: inherit;
        font-variant-numeric: tabular-nums lining-nums;
        font-feature-settings: "tnum" 1, "lnum" 1;
      }

      .sidebar {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(250, 244, 235, 0.94)),
          linear-gradient(180deg, #f9f4eb 0%, #f2eadf 100%);
        border-right: 1px solid rgba(162, 181, 204, 0.24);
        box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.54);
        color: var(--text);
      }

      .brand-card,
      .event-context,
      .simulator-card,
      .sidebar-foot {
        background: rgba(255, 255, 255, 0.66);
        border-color: rgba(164, 183, 205, 0.24);
        box-shadow:
          0 18px 44px rgba(91, 109, 134, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      .brand-mark,
      .sidebar .section-label {
        color: #6f88ae;
      }

      .brand-card p,
      .event-context small,
      .simulator-card p,
      .sidebar-foot small,
      .field-label {
        color: var(--text-soft);
      }

      .context-chips span {
        background: rgba(75, 124, 200, 0.1);
        color: #3b5679;
        border: 1px solid rgba(75, 124, 200, 0.12);
      }

      .nav-button {
        color: var(--text);
        background: rgba(255, 255, 255, 0.5);
        border-color: rgba(164, 183, 205, 0.18);
      }

      .nav-button small {
        color: rgba(73, 95, 123, 0.66);
      }

      .nav-button:hover,
      .nav-button.is-active {
        background: linear-gradient(135deg, rgba(239, 246, 254, 0.98), rgba(255, 248, 239, 0.96));
        border-color: rgba(104, 133, 180, 0.38);
        box-shadow: 0 16px 34px rgba(86, 111, 142, 0.12);
      }

      .simulator-card select,
      .score-card input {
        background: rgba(255, 255, 255, 0.92);
        border-color: rgba(124, 145, 173, 0.18);
      }

      .pill {
        color: #324860;
        background: rgba(255, 255, 255, 0.76);
        border-color: rgba(176, 191, 209, 0.54);
      }

      .pill-accent {
        color: #3c6097;
        background: rgba(75, 124, 200, 0.12);
        border-color: rgba(75, 124, 200, 0.18);
      }

      .panel,
      .metric-card {
        border-color: rgba(255, 255, 255, 0.64);
        box-shadow: var(--shadow);
      }

      .panel::before,
      .metric-card::before {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.42), transparent 34%);
      }

      .panel-dark {
        color: var(--text);
        border-color: rgba(168, 186, 207, 0.3);
      }

      .panel-dark .section-label,
      .panel-dark .panel-note,
      .panel-dark p,
      .panel-dark small,
      .banner-metrics span,
      .phase-card span {
        color: var(--text-soft);
      }

      .banner-metrics div,
      .phase-card {
        background: rgba(255, 255, 255, 0.54);
        border-color: rgba(164, 183, 205, 0.2);
      }

      .primary-button {
        background: linear-gradient(135deg, #5a89d4 0%, #3d7293 100%);
        box-shadow: 0 16px 32px rgba(87, 127, 182, 0.24);
      }

      .secondary-button {
        background: rgba(255, 255, 255, 0.82);
        border-color: rgba(168, 186, 207, 0.3);
      }

      .metric-card.tone-accent {
        background: linear-gradient(180deg, rgba(75, 124, 200, 0.16), rgba(255, 255, 255, 0.94));
      }

      .metric-card.tone-anomaly {
        background: linear-gradient(180deg, rgba(196, 101, 93, 0.14), rgba(255, 255, 255, 0.94));
      }

      .room-card,
      .feed-item,
      .pending-card,
      .list-card,
      .judge-progress-item,
      .mini-row,
      .info-card,
      .score-card,
      .rule-item,
      .room-list-item,
      .team-chip {
        background: rgba(255, 255, 255, 0.84);
      }

      .room-card.tone-scoring,
      .room-list-item.is-active,
      .team-chip.is-active,
      .feed-item.tone-scoring {
        background: linear-gradient(180deg, rgba(75, 124, 200, 0.1), rgba(255, 255, 255, 0.92));
        border-color: rgba(75, 124, 200, 0.28);
      }

      .room-card.tone-anomaly,
      .feed-item.tone-anomaly,
      .anomaly-callout {
        background: linear-gradient(180deg, rgba(196, 101, 93, 0.08), rgba(255, 251, 250, 0.94));
        border-color: rgba(196, 101, 93, 0.22);
      }

      .success-callout,
      .judge-progress-item.is-done {
        background: linear-gradient(180deg, rgba(62, 134, 105, 0.08), rgba(248, 255, 251, 0.94));
        border-color: rgba(62, 134, 105, 0.18);
      }

      .quick-score {
        color: #31537d;
        background: rgba(75, 124, 200, 0.1);
      }

      .rank-number {
        background: rgba(75, 124, 200, 0.12);
        color: #3c6097;
      }

      .toast {
        color: var(--text);
        background: rgba(248, 241, 232, 0.96);
        border: 1px solid rgba(189, 171, 146, 0.24);
        box-shadow: 0 18px 40px rgba(112, 100, 86, 0.18);
      }

      @media (max-width: 1100px) {
        .sidebar {
          border-bottom: 1px solid rgba(162, 181, 204, 0.24);
        }
      }
    </style>

        function syncRiskFeed() {
          const feed = document.querySelector(riskFeedSelector);
          if (!feed) return;

          const items = Array.from(feed.querySelectorAll(".feed-item"));
          let anomalyCount = 0;

          items.forEach(function (item) {
            const isAnomaly = item.classList.contains("tone-anomaly");
            item.style.display = isAnomaly ? "" : "none";
            if (isAnomaly) anomalyCount += 1;
          });

          let emptyState = feed.querySelector("." + riskFeedEmptyClass);
          if (anomalyCount === 0) {
            if (!emptyState) {
              emptyState = document.createElement("div");
              emptyState.className = "empty-panel " + riskFeedEmptyClass;
              emptyState.innerHTML =
                "<strong>当前没有异常房间</strong><p>无异常待补分房间，正常评分中的房间已在“20 房间实时态势”中展示。</p>";
              feed.appendChild(emptyState);
            }
            return;
          }

          if (emptyState) emptyState.remove();

            const isReminderTrigger =

            if (!isReminderTrigger) return;

            button.textContent = "一键提醒评委";

            const panel = button.closest(".action-panel");
            if (!panel) return;

            const missingJudges = Array.from(panel.querySelectorAll(".tag-row .tag")).map(function (tag) {
              return tag.textContent.trim();
            });
            const message = panel.querySelector("p");
            if (message) {
              const count = missingJudges.length;
              message.textContent =
                count > 0
                  ? "当前仍缺 " +
                    count +
                    " 位评委分数，工作人员仅可发起提醒，不可代替评委提交评分。"

        function parseJudgeScoreValue(value) {
          const normalized = typeof value === "string" ? value.trim() : String(value ?? "").trim();
          if (!normalized) return null;

          const score = Number(normalized);
          return Number.isFinite(score) && score >= 1 && score <= 10 ? score : null;
        }

        function formatJudgeTotal(total) {
          return total.toFixed(1) + " / 100";

        function getJudgeScoreState() {
          const judgePanel = Array.from(document.querySelectorAll(".judge-grid > article.panel")).find(function (
            panel,
          ) {
            return panel.querySelector(".score-head") && panel.querySelector(".score-grid");
          });

          if (!judgePanel) return null;

          const scoreCards = Array.from(judgePanel.querySelectorAll(".score-grid .score-card"));
          if (!scoreCards.length) return null;

          const scores = scoreCards.map(function (card) {
            const label = card.querySelector(".score-card-head strong");
            const input = card.querySelector("input");
            const raw = input ? input.value.trim() : "";

            return {
              label: label ? label.textContent.trim() : "评分项",
              raw: raw,
              hasValue: raw !== "",
              value: parseJudgeScoreValue(raw),
            };
          });

          const filledCount = scores.filter(function (item) {
            return item.hasValue;
          }).length;
          const validScores = scores.filter(function (item) {
            return item.value !== null;
          });
          const total =
            validScores.length === scores.length
              ? Number(
                  (
                    (validScores.reduce(function (sum, item) {
                      return sum + item.value;
                    }, 0) /
                      scores.length) *
                    10
                  ).toFixed(1),
                )
              : null;

          const teamHeading = judgePanel.querySelector(".panel-head h3");
          const judgeHeading = document.querySelector(".judge-banner h3");

          return {
            panel: judgePanel,
            scores: scores,
            filledCount: filledCount,
            validCount: validScores.length,
            total: total,
            allValid: validScores.length === scores.length,
            teamName: teamHeading ? teamHeading.textContent.trim() : "当前队伍",
            judgeName: judgeHeading
              ? judgeHeading.textContent.replace(/^当前账号：/, "").trim()
              : "当前评委",
          };
        }

        function syncJudgeScoreSummary() {
          const state = getJudgeScoreState();
          if (!state) {
            closeJudgeSubmitDialog();
            return;
          }

          const scoreHead = state.panel.querySelector(".score-head");
          if (!scoreHead) return;

          let summary = scoreHead.querySelector("." + judgeScoreSummaryClass);
          if (!summary) {
            summary = document.createElement("div");
            summary.className = judgeScoreSummaryClass;

            const label = document.createElement("span");
            label.className = judgeScoreLabelClass;
            label.textContent = "队伍总分";

            const value = document.createElement("strong");
            value.className = judgeScoreValueClass;

            summary.appendChild(label);
            summary.appendChild(value);
            scoreHead.appendChild(summary);
          }

          const note = scoreHead.querySelector(".panel-note");
          if (note && note.parentElement !== summary) {
            summary.appendChild(note);
          }

          const value = summary.querySelector("." + judgeScoreValueClass);
          if (!value) return;

          if (state.allValid && state.total !== null) {
            summary.dataset.state = "ready";
            value.textContent = formatJudgeTotal(state.total);
            return;
          }

          if (state.filledCount === state.scores.length && state.validCount < state.scores.length) {
            summary.dataset.state = "invalid";
            value.textContent = "待修正分值";
            return;
          }

          summary.dataset.state = "pending";
          value.textContent = "待完成 " + (state.scores.length - state.validCount) + " 项";

          if (copy) {

        document.addEventListener(

            const button = event.target instanceof Element ? event.target.closest("button") : null;
            const buttonText = getButtonText(button);
            if (!buttonText || !buttonText.includes("锁定并提交评分")) return;

            if (allowNativeJudgeSubmit) {
              allowNativeJudgeSubmit = false;
              return;
            }

            const state = getJudgeScoreState();
            if (!state || !state.allValid || state.total === null) return;

            event.preventDefault();
            event.stopPropagation();

                ? Array.from(panel.querySelectorAll(".tag-row .tag"))

          window.requestAnimationFrame(syncJudgeQueuePanel);
          window.requestAnimationFrame(syncReadyPublishPanel);
          window.requestAnimationFrame(syncReminderActionPanel);
          window.requestAnimationFrame(syncRoomSummaryPanel);
          window.requestAnimationFrame(syncResultsLeaderboardPanel);
        });

        observer.observe(document.body, { childList: true, subtree: true });
        window.requestAnimationFrame(syncRiskFeed);
        window.requestAnimationFrame(syncCommandRoomMatrixPanel);
        window.requestAnimationFrame(syncCommandHeroActions);

        window.requestAnimationFrame(syncJudgeScoreSummary);

        window.requestAnimationFrame(syncReadyPublishPanel);
        window.requestAnimationFrame(syncReminderActionPanel);
        window.requestAnimationFrame(syncRoomSummaryPanel);
        window.requestAnimationFrame(syncResultsLeaderboardPanel);
      })();

    <script>
      (function () {
        const judgeMetricSelector = ".judge-banner .banner-metrics > div:first-child";
        const judgeTargetHeadingSelector = ".judge-grid > article.panel .panel-head h3";

        function patchJudgeCurrentGroup() {
          const metric = document.querySelector(judgeMetricSelector);
          if (!metric) return;

          const label = metric.querySelector("span");
          const value = metric.querySelector("strong");
          if (!label || !value) return;

          const targetHeading = document.querySelector(judgeTargetHeadingSelector);
          const targetName = targetHeading ? targetHeading.textContent.trim() : "";
          const currentText = value.textContent.replace(/\s+/g, " ").trim();
          const renderedTextPreview = (value.dataset.renderedText || "").replace(/\s+/g, " ").trim();

          if (currentText && !value.dataset.originalValue && !value.dataset.renderedText) {
            value.dataset.originalValue = currentText;
          }

          const sourceText = value.dataset.originalValue || currentText || "本轮已完成";
          const sourceParts = sourceText.includes(" · ")
            ? sourceText.split(" · ").map(function (part) {
                return part.trim();
              })
            : [];
          const fallbackGroupName = sourceParts.length > 1 ? sourceParts[0] : "";
          const scheduleText =
            sourceParts.length > 1
              ? sourceParts.slice(1).join(" · ")
              : sourceText || "本轮已完成";
          const groupName = targetName || fallbackGroupName || "当前小组";
          const renderKey = [groupName, scheduleText].filter(Boolean).join("||");

          if (label.textContent !== "当前小组") {
            label.textContent = "当前小组";
          }

          if (!value.classList.contains("judge-current-group")) {
            value.classList.add("judge-current-group");
          }

          if (value.dataset.renderedText !== renderKey) {
            value.textContent = "";

            const nameLine = document.createElement("span");
            nameLine.className = "judge-current-group__name";
            nameLine.textContent = groupName;
            value.appendChild(nameLine);

            if (scheduleText) {
              const scheduleLine = document.createElement("span");
              scheduleLine.className = "judge-current-group__schedule";
              scheduleLine.textContent = scheduleText;
              value.appendChild(scheduleLine);
            }

            value.dataset.renderedText = renderKey;
          }
        }

        const observer = new MutationObserver(function () {
          patchJudgeCurrentGroup();
        });

        observer.observe(document.body, { childList: true, subtree: true });
        patchJudgeCurrentGroup();
      })();

    <script>
      (function () {
        const lockedPanelClass = "judge-locked-panel";
        const lockedMetaClass = "judge-locked-meta";
        const lockedStateKeyAttr = "data-judge-locked-key";
        const lockedOriginalHtmlKey = "__judgeLockedOriginalHtml";
        const lockedModeKey = "__judgeLockedMode";
        let cachedContainerKey = "";
        let patchFrame = 0;
        let patchTimer = 0;
        let followupTimer = 0;
        let bannerMetricsObserver = null;

        function getRootContainer() {
          const root = document.getElementById("root");
          if (!root) return null;

          if (cachedContainerKey && root[cachedContainerKey]) {
            return root[cachedContainerKey];
          }

          cachedContainerKey =
            Object.keys(root).find(function (key) {
              return key.indexOf("__reactContainer$") === 0;
            }) || "";

          return cachedContainerKey ? root[cachedContainerKey] : null;
        }

        function findReactJudgeProps() {
          const container = getRootContainer();
          if (!container) return null;

          const stack = [container];
          const seen = new Set();

          while (stack.length) {
            const current = stack.pop();
            if (!current || seen.has(current)) continue;
            seen.add(current);

            const props = current.memoizedProps;
            if (
              props &&
              props.currentJudge &&
              props.judgeRoom &&
              Object.prototype.hasOwnProperty.call(props, "judgeTarget")
            ) {
              return props;
            }

            if (current.child) stack.push(current.child);
            if (current.sibling) stack.push(current.sibling);
            if (current.alternate) stack.push(current.alternate);
            if (current.stateNode && current.stateNode.current && current.stateNode.current !== current) {
              stack.push(current.stateNode.current);
            }
          }

          return null;
        }

        function formatSubmittedTotal(scores) {
          const values = Object.values(scores || {}).filter(function (value) {
            return typeof value === "number";
          });
          if (!values.length) return "--";

          const average = values.reduce(function (sum, value) {
            return sum + value;
          }, 0) / values.length;

          return (average * 10).toFixed(1) + " / 100";
        }

        function getActiveJudgeTeam(props) {
          if (!props || !props.judgeRoom) return null;

          return (
            props.judgeRoom.teams.find(function (team) {
              return team.state === "scoring" || team.state === "anomaly";
            }) || null
          );
        }

        function getSubmittedRecord(props, activeTeam) {
          if (!props || !activeTeam || !props.currentJudge) return null;

          return (
            activeTeam.scoreRecords.find(function (record) {
              return record.judgeId === props.currentJudge.id;
            }) || null
          );
        }

        function buildInfoCard(label, value) {
          const card = document.createElement("div");
          card.className = "info-card";

          const labelNode = document.createElement("span");
          labelNode.textContent = label;

          const valueNode = document.createElement("strong");
          valueNode.textContent = value;

          card.appendChild(labelNode);
          card.appendChild(valueNode);
          return card;
        }

        function normalizeText(value) {
          return (value || "").replace(/\s+/g, " ").trim();
        }

        function getJudgeLivePreview(judgePanel) {
          if (!judgePanel) return "";

          const values = Array.from(judgePanel.querySelectorAll(".score-grid input"))
            .map(function (input) {
              return Number(input.value);
            })
            .filter(function (value) {
              return !Number.isNaN(value) && value >= 1 && value <= 10;
            });

          if (!values.length) return "";

          const average = values.reduce(function (sum, value) {
            return sum + value;
          }, 0) / values.length;

          return (average * 10).toFixed(1) + " / 100";
        }

        function formatJudgeBannerMetricValue(metricIndex, splitMode) {
          const metric = document.querySelector(".judge-banner .banner-metrics > div:nth-child(" + metricIndex + ")");
          if (!metric) return;

          const value = metric.querySelector("strong");
          if (!value) return;

          const rawText = normalizeText(value.textContent);
          const renderedKeyPreview = value.dataset.renderedMetricKey || "";

          if (rawText && rawText !== renderedKeyPreview) {
            value.dataset.metricRaw = rawText;
          }

          const sourceText = value.dataset.metricRaw || rawText;
          if (!sourceText) return;

          let primaryText = sourceText;
          let secondaryText = "";

          if (splitMode === "fraction" && sourceText.includes("/")) {
            const parts = sourceText.split("/");
            primaryText = parts.shift().trim() + " /";
            secondaryText = parts.join("/").trim();
          }

          const nextKey = [metricIndex, splitMode, primaryText, secondaryText].join("||");
          if (value.dataset.renderedMetricKey === nextKey) return;

          value.textContent = "";
          value.classList.add("judge-banner-metric-display");

          const primaryNode = document.createElement("span");
          primaryNode.className = "judge-current-group__name";
          primaryNode.textContent = primaryText;
          value.appendChild(primaryNode);

          if (secondaryText) {
            const secondaryNode = document.createElement("span");
            secondaryNode.className = "judge-current-group__schedule";
            secondaryNode.textContent = secondaryText;
            value.appendChild(secondaryNode);
          }

          value.dataset.renderedMetricKey = nextKey;
        }

        function syncJudgeBannerMetricTypography() {
          formatJudgeBannerMetricValue(2, "single");
          formatJudgeBannerMetricValue(3, "single");
        }

        function syncJudgeBannerSummary(props, activeTeam, submittedRecord, judgePanel) {
          const summaryMetric = document.querySelector(".judge-banner .banner-metrics > div:nth-child(3)");
          if (!summaryMetric) return;

          const summaryLabel = summaryMetric.querySelector("span");
          const summaryValue = summaryMetric.querySelector("strong");
          if (!summaryLabel || !summaryValue) return;

          rememberText(summaryLabel);
          rememberText(summaryValue);

          if (submittedRecord) {
            summaryLabel.textContent = "我的已提交分数";
            summaryValue.textContent = formatSubmittedTotal(submittedRecord.scores);
            summaryValue.dataset.metricRaw = normalizeText(summaryValue.textContent);
            return;
          }

          const livePreview = getJudgeLivePreview(judgePanel);
          if (livePreview) {
            summaryLabel.textContent = "当前录入预览";
            summaryValue.textContent = livePreview;
            summaryValue.dataset.metricRaw = normalizeText(summaryValue.textContent);
            return;
          }

          if (activeTeam) {
            summaryLabel.textContent = "我的提交状态";
            summaryValue.textContent = "待打分";
            summaryValue.dataset.metricRaw = normalizeText(summaryValue.textContent);
            return;
          }

          restoreText(summaryLabel);
          restoreText(summaryValue);
          delete summaryValue.dataset.metricRaw;
        }

        function bindJudgeBannerMetricObserver() {
          const metrics = document.querySelector(".judge-banner .banner-metrics");
          if (!metrics) return;

          if (bannerMetricsObserver && metrics.dataset.metricObserverBound === "1") {
            return;
          }

          if (bannerMetricsObserver) {
            bannerMetricsObserver.disconnect();
          }

          bannerMetricsObserver = new MutationObserver(function () {
            schedulePatch(0);
          });

          bannerMetricsObserver.observe(metrics, {
            childList: true,
            subtree: true,
            characterData: true,
          });

          metrics.dataset.metricObserverBound = "1";
        }

        function showUnlockToast(message) {
          let toast = document.querySelector(".judge-unlock-toast");

          if (!toast) {
            toast = document.createElement("div");
            toast.className = "toast judge-unlock-toast";
            document.body.appendChild(toast);
          }

          toast.textContent = message;
          toast.style.display = "block";

          if (toast._timer) {
            window.clearTimeout(toast._timer);
          }

          toast._timer = window.setTimeout(function () {
            toast.style.display = "none";
          }, 2800);
        }

        function rememberText(node) {
          if (!node || Object.prototype.hasOwnProperty.call(node.dataset, "originalText")) return;
          node.dataset.originalText = node.textContent || "";
        }

        function rememberClass(node) {
          if (!node || Object.prototype.hasOwnProperty.call(node.dataset, "originalClass")) return;
          node.dataset.originalClass = node.className || "";
        }

        function restoreText(node) {
          if (!node || !Object.prototype.hasOwnProperty.call(node.dataset, "originalText")) return;
          node.textContent = node.dataset.originalText;
        }

        function restoreClass(node) {
          if (!node || !Object.prototype.hasOwnProperty.call(node.dataset, "originalClass")) return;
          node.className = node.dataset.originalClass;
        }

        function getJudgePanel() {
          return document.querySelector(".judge-grid > article.panel");
        }

        function restoreJudgeInteractiveState(judgePanel) {
          if (!judgePanel) return;

          if (
            judgePanel[lockedModeKey] === "replace" &&
            judgePanel[lockedOriginalHtmlKey] &&
            judgePanel.querySelector("." + lockedPanelClass)
          ) {
            judgePanel.innerHTML = judgePanel[lockedOriginalHtmlKey];
          }

          judgePanel[lockedModeKey] = "";

          const scoreHead = judgePanel.querySelector(".score-head");
          const statusBadge = judgePanel.querySelector(".panel-head .status-badge");
          const headLabel = judgePanel.querySelector(".panel-head .section-label");
          const scoreHeadLabel = scoreHead ? scoreHead.querySelector(".section-label") : null;
          const scoreHeadTitle = scoreHead ? scoreHead.querySelector("h4") : null;
          const scoreHeadNote = scoreHead ? scoreHead.querySelector(".panel-note") : null;
          const bannerMetrics = document.querySelectorAll(".judge-banner .banner-metrics > div");
          const errorStrip = judgePanel.querySelector(".error-strip");
          const lockedMeta = judgePanel.querySelector("." + lockedMetaClass);
          const lockedPanel = judgePanel.querySelector("." + lockedPanelClass);
          const actionRow = judgePanel.querySelector(".action-row");

          restoreText(headLabel);
          restoreText(scoreHeadLabel);
          restoreText(scoreHeadTitle);
          restoreText(scoreHeadNote);
          restoreClass(statusBadge);
          restoreText(statusBadge);

          if (bannerMetrics.length >= 3) {
            const summaryLabel = bannerMetrics[2].querySelector("span");
            const summaryValue = bannerMetrics[2].querySelector("strong");
            restoreText(summaryLabel);
            restoreText(summaryValue);
          }

          judgePanel.querySelectorAll(".score-grid input").forEach(function (input) {
            if (input.dataset.lockedManaged === "1") {
              input.disabled = false;
              input.readOnly = false;
              delete input.dataset.lockedManaged;
            }
          });

          judgePanel.querySelectorAll(".score-grid .quick-score").forEach(function (button) {
            if (button.dataset.lockedManaged === "1") {
              button.disabled = false;
              button.classList.remove("judge-locked-quick-score");
              delete button.dataset.lockedManaged;
            }
          });

          if (errorStrip && Object.prototype.hasOwnProperty.call(errorStrip.dataset, "originalHtml")) {
            errorStrip.innerHTML = errorStrip.dataset.originalHtml;
          }

          if (actionRow && actionRow.dataset.lockedHidden === "1") {
            actionRow.hidden = false;
            actionRow.style.display = "";
            delete actionRow.dataset.lockedHidden;
          }

          if (lockedMeta) {
            lockedMeta.remove();
          }

          if (lockedPanel) {
            lockedPanel.remove();
          }

          judgePanel.removeAttribute(lockedStateKeyAttr);
        }

        function buildLockedJudgePanel(judgePanel, judgeTeam, currentJudge, submittedRecord) {
          if (!judgePanel || !judgeTeam || !currentJudge || !submittedRecord) return;

          judgePanel[lockedOriginalHtmlKey] = judgePanel.innerHTML;
          judgePanel[lockedModeKey] = "replace";
          judgePanel.innerHTML = "";

          const panelHead = document.createElement("div");
          panelHead.className = "panel-head";

          const panelHeadCopy = document.createElement("div");
          const headLabel = document.createElement("span");
          headLabel.className = "section-label";
          headLabel.textContent = "已提交评分对象";
          const headTitle = document.createElement("h3");
          headTitle.textContent = judgeTeam.name;
          panelHeadCopy.appendChild(headLabel);
          panelHeadCopy.appendChild(headTitle);

          const statusBadge = document.createElement("span");
          statusBadge.className = "status-badge tone-complete";
          statusBadge.textContent = "已完成";

          panelHead.appendChild(panelHeadCopy);
          panelHead.appendChild(statusBadge);
          judgePanel.appendChild(panelHead);

          const contextGrid = document.createElement("div");
          contextGrid.className = "context-grid";
          contextGrid.appendChild(buildInfoCard("队伍编号", judgeTeam.code || "--"));
          contextGrid.appendChild(buildInfoCard("所属单位", judgeTeam.school || "--"));
          contextGrid.appendChild(buildInfoCard("研究主题", judgeTeam.topic || "--"));
          contextGrid.appendChild(
            buildInfoCard(
              "展示顺序",
              typeof judgeTeam.order === "number" ? "第 " + judgeTeam.order + " 组" : "--",
            ),
          );
          judgePanel.appendChild(contextGrid);

          const scoreHead = document.createElement("div");
          scoreHead.className = "score-head";

          const scoreHeadCopy = document.createElement("div");
          const scoreHeadLabel = document.createElement("span");
          scoreHeadLabel.className = "section-label";
          scoreHeadLabel.textContent = "已提交评分明细";
          const scoreHeadTitle = document.createElement("h4");
          scoreHeadTitle.textContent = "当前评分已锁定，等待下一队伍";
          scoreHeadCopy.appendChild(scoreHeadLabel);
          scoreHeadCopy.appendChild(scoreHeadTitle);

          const scoreHeadNote = document.createElement("small");
          scoreHeadNote.className = "panel-note";
          scoreHeadNote.textContent = "当前评委已完成本队评分，界面不再显示待打分输入项。";

          scoreHead.appendChild(scoreHeadCopy);
          scoreHead.appendChild(scoreHeadNote);
          judgePanel.appendChild(scoreHead);

          const lockedMeta = document.createElement("div");
          lockedMeta.className = "context-grid " + lockedMetaClass;
          lockedMeta.appendChild(buildInfoCard("提交时间", submittedRecord.submittedAt || "--"));
          lockedMeta.appendChild(buildInfoCard("我的总分", formatSubmittedTotal(submittedRecord.scores)));
          judgePanel.appendChild(lockedMeta);

          const lockedPanel = document.createElement("div");
          lockedPanel.className = "action-panel success-callout " + lockedPanelClass;

          const title = document.createElement("strong");
          title.textContent = "已完成 " + judgeTeam.name + " 的评分，请等待下一队伍进入评分窗口。";

          const copy = document.createElement("p");
          copy.textContent =
            "你提交的四项分数已于 " +
            (submittedRecord.submittedAt || "--") +
            " 锁定。如需调整，请联系工作人员解除锁定后再修改。";

          const buttonRow = document.createElement("div");
          buttonRow.className = "action-row";

          const unlockButton = document.createElement("button");
          unlockButton.type = "button";
          unlockButton.className = "secondary-button";
          unlockButton.textContent = "联系工作人员解除锁定并修改评分";
          unlockButton.addEventListener("click", function () {
            showUnlockToast(
              "已通知工作人员：请解除 " +
                currentJudge.name +
                " 对 " +
                judgeTeam.name +
                " 的评分锁定并开放修改。",
            );
          });

          buttonRow.appendChild(unlockButton);
          lockedPanel.appendChild(title);
          lockedPanel.appendChild(copy);
          lockedPanel.appendChild(buttonRow);
          judgePanel.appendChild(lockedPanel);
        }

        function createLockedStateKey(props, activeTeam, submittedRecord) {
          if (!props || !props.currentJudge || !activeTeam || !submittedRecord) return "";
          return [
            props.currentJudge.id,
            activeTeam.id || activeTeam.name || "",
            submittedRecord.submittedAt || "",
            JSON.stringify(submittedRecord.scores || {}),
          ].join("||");
        }

        function patchJudgeLockedState() {
          bindJudgeBannerMetricObserver();

          const judgePanel = getJudgePanel();
          if (!judgePanel) return;

          const props = findReactJudgeProps();
          const activeTeam = getActiveJudgeTeam(props);
          const submittedRecord = getSubmittedRecord(props, activeTeam);
          const nextStateKey = createLockedStateKey(props, activeTeam, submittedRecord);

          syncJudgeBannerSummary(props, activeTeam, submittedRecord, judgePanel);

          if (!props || !activeTeam || !submittedRecord) {
            restoreJudgeInteractiveState(judgePanel);
            syncJudgeBannerMetricTypography();
            return;
          }

          if (judgePanel.getAttribute(lockedStateKeyAttr) === nextStateKey) {
            syncJudgeBannerMetricTypography();
            return;
          }

          restoreJudgeInteractiveState(judgePanel);
          buildLockedJudgePanel(judgePanel, activeTeam, props.currentJudge, submittedRecord);

          judgePanel.setAttribute(lockedStateKeyAttr, nextStateKey);
          syncJudgeBannerMetricTypography();
        }

        function schedulePatch(delay) {
          const runPatch = function () {
            patchFrame = 0;
            patchJudgeLockedState();
          };

          if (delay && delay > 0) {
            window.clearTimeout(patchTimer);
            patchTimer = window.setTimeout(function () {
              if (!patchFrame) {
                patchFrame = window.requestAnimationFrame(runPatch);
              }
            }, delay);
            return;
          }

          if (!patchFrame) {
            patchFrame = window.requestAnimationFrame(runPatch);
          }
        }

        function triggerPatchSequence() {
          schedulePatch(0);
          window.clearTimeout(followupTimer);
          followupTimer = window.setTimeout(function () {
            schedulePatch(0);
          }, 180);
        }

        document.addEventListener(
          "click",
          function (event) {
            const element = event.target instanceof Element ? event.target : null;
            if (!element) return;

            const relevantTarget = element.closest(
              ".sidebar .nav-button, .topbar-actions button, .judge-grid button, .judge-grid input, .judge-banner button, .action-row button",
            );

            if (relevantTarget) {
              triggerPatchSequence();
            }
          },
          true,
        );

        document.addEventListener(
          "change",
          function (event) {
            const element = event.target instanceof Element ? event.target : null;
            if (!element) return;

            if (element.closest(".judge-grid, .judge-banner")) {
              triggerPatchSequence();
            }
          },
          true,
        );

        document.addEventListener(
          "input",
          function (event) {
            const element = event.target instanceof Element ? event.target : null;
            if (!element) return;

            if (element.closest(".judge-grid")) {
              schedulePatch(48);
            }
          },
          true,
        );

        document.addEventListener(
          "keydown",
          function (event) {
            if (event.key === "Tab" || event.key === "Enter") {
              schedulePatch(64);
            }
          },
          true,
        );

        schedulePatch(0);
        schedulePatch(220);
        schedulePatch(720);
        schedulePatch(1320);
      })();
    </script>
  </body>
</html>
